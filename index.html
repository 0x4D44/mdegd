<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday Eric! 🎂</title>
  <style>
    /* ─── Base reset & layout ────────────────────────────────────── */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 2rem 1rem;
      background: var(--bg-primary, #1a1a2e);
      color: var(--text-primary, #eee);
      font-family: var(--font-body, sans-serif);
      line-height: 1.6;
      transition: background 0.3s ease, color 0.3s ease;
    }

    #app {
      width: 100%;
      max-width: 700px;
      position: relative;
      z-index: 10;
    }

    /* ─── Typography ─────────────────────────────────────────────── */
    h1 {
      font-family: var(--font-heading, serif);
      font-size: clamp(1.5rem, 5vw, 2.5rem);
      text-align: center;
      margin-bottom: 0.5rem;
      color: var(--accent, #ffd700);
    }

    h2 {
      font-family: var(--font-heading, serif);
      font-size: clamp(1.1rem, 3vw, 1.5rem);
      text-align: center;
      margin-bottom: 1rem;
      color: var(--text-secondary, #aaa);
    }

    .subtitle {
      text-align: center;
      font-style: italic;
      color: var(--text-secondary, #aaa);
      margin-bottom: 2rem;
      font-size: 0.95rem;
    }

    /* ─── Quiz card ──────────────────────────────────────────────── */
    .quiz-card {
      background: var(--bg-secondary, #222);
      border-radius: var(--border-radius, 8px);
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    /* ─── Buttons ────────────────────────────────────────────────── */
    button {
      display: block;
      width: 100%;
      padding: 0.85rem 1.2rem;
      margin-bottom: 0.6rem;
      border: 2px solid var(--border-color, #444);
      border-radius: var(--border-radius, 8px);
      background: var(--button-bg, #333);
      color: var(--button-text, #eee);
      font-family: var(--font-body, sans-serif);
      font-size: 1rem;
      cursor: pointer;
      text-align: left;
      transition: background 0.15s ease, border-color 0.15s ease, transform 0.1s ease;
    }

    button:hover:not(:disabled) {
      background: var(--button-hover, #444);
      transform: translateX(4px);
    }

    button:focus-visible {
      outline: 3px solid var(--accent, #ffd700);
      outline-offset: 2px;
    }

    button:disabled {
      cursor: default;
      opacity: 0.85;
    }

    button.correct {
      border-color: var(--correct, #4caf50);
      background: var(--correct, #4caf50);
      color: #fff;
    }

    button.incorrect {
      border-color: var(--incorrect, #e74c3c);
      background: var(--incorrect, #e74c3c);
      color: #fff;
    }

    button.was-correct {
      border-color: var(--correct, #4caf50);
      border-style: dashed;
    }

    /* ─── Name selection ─────────────────────────────────────────── */
    .name-buttons {
      display: flex;
      gap: 1rem;
      justify-content: center;
      margin: 2rem 0;
    }

    .name-buttons button {
      width: auto;
      padding: 1rem 2.5rem;
      font-size: 1.3rem;
      text-align: center;
      font-family: var(--font-heading, serif);
    }

    /* ─── Progress bar ───────────────────────────────────────────── */
    .progress-bar {
      width: 100%;
      height: 6px;
      background: var(--bg-secondary, #222);
      border-radius: 3px;
      margin-bottom: 1.5rem;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: var(--accent, #ffd700);
      transition: width 0.3s ease;
      border-radius: 3px;
    }

    .progress-text {
      text-align: center;
      font-size: 0.85rem;
      color: var(--text-secondary, #aaa);
      margin-bottom: 0.5rem;
    }

    /* ─── Explanation panel ───────────────────────────────────────── */
    .explanation {
      margin-top: 1rem;
      padding: 1rem;
      border-left: 3px solid var(--accent, #ffd700);
      background: rgba(0,0,0,0.1);
      border-radius: 0 var(--border-radius, 8px) var(--border-radius, 8px) 0;
      font-size: 0.9rem;
      color: var(--text-secondary, #ccc);
    }

    .explanation .verdict {
      font-weight: bold;
      margin-bottom: 0.3rem;
    }

    .explanation .verdict.correct {
      color: var(--correct, #4caf50);
    }

    .explanation .verdict.incorrect {
      color: var(--incorrect, #e74c3c);
    }

    /* ─── Next button ────────────────────────────────────────────── */
    .next-btn {
      margin-top: 1rem;
      text-align: center;
      font-weight: bold;
      background: var(--accent, #ffd700);
      color: var(--bg-primary, #1a1a2e);
      border-color: var(--accent, #ffd700);
    }

    .next-btn:hover:not(:disabled) {
      filter: brightness(1.1);
      transform: translateY(-2px);
    }

    /* ─── Score / results ────────────────────────────────────────── */
    .score-display {
      text-align: center;
      margin: 1rem 0;
    }

    .score-number {
      font-family: var(--font-heading, serif);
      font-size: clamp(3rem, 10vw, 5rem);
      color: var(--accent, #ffd700);
      line-height: 1;
    }

    .score-label {
      font-size: 1.1rem;
      color: var(--text-secondary, #aaa);
    }

    .result-message {
      text-align: center;
      font-size: 1.1rem;
      padding: 1rem;
      margin: 1rem 0;
      color: var(--text-primary, #eee);
      font-style: italic;
    }

    .play-again-btn {
      margin-top: 1.5rem;
      text-align: center;
      font-weight: bold;
      background: var(--accent, #ffd700);
      color: var(--bg-primary, #1a1a2e);
      border-color: var(--accent, #ffd700);
      font-size: 1.1rem;
    }

    /* ─── Category badge ─────────────────────────────────────────── */
    .category-badge {
      display: inline-block;
      font-size: 0.75rem;
      padding: 0.15rem 0.6rem;
      border-radius: 999px;
      background: var(--accent, #ffd700);
      color: var(--bg-primary, #1a1a2e);
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.8rem;
    }

    .question-text {
      font-size: 1.1rem;
      margin-bottom: 1.2rem;
      line-height: 1.5;
    }

    /* ─── Hidden card easter egg ──────────────────────────────────── */
    .hidden-card {
      position: fixed;
      bottom: 10px;
      right: 10px;
      width: 30px;
      height: 42px;
      background: var(--bg-secondary, #222);
      border: 1px solid var(--border-color, #444);
      border-radius: 3px;
      cursor: pointer;
      opacity: 0.15;
      transition: opacity 0.3s, transform 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      z-index: 100;
    }

    .hidden-card:hover {
      opacity: 0.8;
      transform: scale(1.3) rotate(-5deg);
    }

    .hidden-card.found {
      opacity: 1;
      animation: card-reveal 0.6s ease;
    }

    @keyframes card-reveal {
      0% { transform: scale(1) rotate(0); }
      50% { transform: scale(1.8) rotate(10deg); }
      100% { transform: scale(1.3) rotate(-5deg); }
    }

    /* ─── Fade-in for screens ────────────────────────────────────── */
    .fade-in {
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ─── Theme name badge (top-right) ───────────────────────────── */
    .theme-badge {
      position: fixed;
      top: 10px;
      right: 10px;
      font-size: 0.7rem;
      padding: 0.2rem 0.5rem;
      background: rgba(0,0,0,0.3);
      color: var(--text-secondary, #aaa);
      border-radius: 4px;
      z-index: 100;
      opacity: 0.5;
    }

    /* ─── Top bar (start-over + playing-as) ─────────────────────── */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
      font-size: 0.8rem;
      color: var(--text-secondary, #aaa);
    }

    .top-bar a {
      color: var(--text-secondary, #aaa);
      text-decoration: underline;
      cursor: pointer;
      opacity: 0.7;
    }

    .top-bar a:hover { opacity: 1; }

    /* ─── Share button ───────────────────────────────────────────── */
    .share-btn {
      margin-top: 0.8rem;
      text-align: center;
      font-size: 0.9rem;
      background: var(--button-bg, #333);
      color: var(--button-text, #eee);
    }

    .share-btn.copied {
      background: var(--correct, #4caf50);
      color: #fff;
    }

    /* ─── Birthday banner (March 21st easter egg) ────────────────── */
    .birthday-banner {
      text-align: center;
      padding: 0.8rem;
      margin-bottom: 1rem;
      background: var(--accent, #ffd700);
      color: var(--bg-primary, #1a1a2e);
      border-radius: var(--border-radius, 8px);
      font-weight: bold;
      font-size: 1.1rem;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }

    /* ─── Responsive ─────────────────────────────────────────────── */
    @media (max-width: 480px) {
      body { padding: 1rem 0.5rem; }
      .quiz-card { padding: 1rem; }
      .name-buttons { flex-direction: column; gap: 0.5rem; }
      .name-buttons button { width: 100%; }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div class="hidden-card" id="hidden-card" title="What's this?">🂡</div>
  <div class="theme-badge" id="theme-badge"></div>

  <script type="module">
    import { questions } from './src/questions.js';
    import { getRandomStyle, applyStyle } from './src/styles.js';
    import {
      selectQuestions,
      selectBalancedQuestions,
      getOptionsForMode,
      checkAnswer,
      calculateScore,
      getResultMessage,
      shuffleArray,
    } from './src/quiz-engine.js';

    // ─── State ──────────────────────────────────────────────────
    let state = {
      mode: null,           // "eric" or "ruth"
      questions: [],        // selected questions for this session
      currentIndex: 0,
      answers: [],          // { correct: boolean } for each answered question
      bonusFound: false,    // hidden card easter egg
    };

    const app = document.getElementById('app');
    const hiddenCard = document.getElementById('hidden-card');
    const themeBadge = document.getElementById('theme-badge');

    const QUESTIONS_PER_GAME = 12;

    const CATEGORY_LABELS = {
      'us-state-history':     'US State History',
      'us-states-attributes': 'US States',
      'bridge':               'Bridge',
      'cards':                'Cards & Sleeves',
      'nsheb':                'Scottish Hydro',
      'general':              'March 21st',
    };

    // ─── Date check (March 21st easter egg) ───────────────────
    function isBirthday() {
      const now = new Date();
      return now.getMonth() === 2 && now.getDate() === 21; // March = 2
    }

    // ─── Initialize ─────────────────────────────────────────────
    function init() {
      const style = getRandomStyle();
      applyStyle(style);
      themeBadge.textContent = style.displayName;

      state = {
        mode: null,
        questions: [],
        currentIndex: 0,
        answers: [],
        bonusFound: false,
      };

      showWelcomeScreen(style);
      setupHiddenCard();
    }

    // ─── Hidden card easter egg ─────────────────────────────────
    function setupHiddenCard() {
      hiddenCard.classList.remove('found');
      hiddenCard.onclick = () => {
        if (!state.bonusFound) {
          state.bonusFound = true;
          hiddenCard.classList.add('found');
          hiddenCard.title = "You found the card up the sleeve! +1 bonus point";
        }
      };
    }

    // ─── Welcome screen ─────────────────────────────────────────
    function showWelcomeScreen(style) {
      const birthdayBanner = isBirthday()
        ? '<div class="birthday-banner">It\'s the actual day! Happy Birthday, Eric!</div>'
        : '';

      app.innerHTML = `
        <div class="fade-in">
          ${birthdayBanner}
          <h1>Happy Birthday, Eric!</h1>
          <h2>The March 21st Quiz</h2>
          <p class="subtitle">${style.subtitle}</p>
          <div class="quiz-card">
            <p style="text-align:center; margin-bottom:1rem;">
              Every question is about something that happened on
              <strong>your birthday — March 21st</strong>.
            </p>
            <p style="text-align:center; margin-bottom:1.5rem;">
              But first... who are you?
            </p>
            <div class="name-buttons">
              <button onclick="window.startQuiz('eric')">Eric</button>
              <button onclick="window.startQuiz('ruth')">Ruth</button>
            </div>
          </div>
        </div>
      `;
    }

    // ─── Start quiz ─────────────────────────────────────────────
    window.startQuiz = function(mode) {
      state.mode = mode;
      state.questions = selectBalancedQuestions(questions, QUESTIONS_PER_GAME);
      state.currentIndex = 0;
      state.answers = [];
      showQuestion();
    };

    // ─── Show question ──────────────────────────────────────────
    function showQuestion() {
      const q = state.questions[state.currentIndex];
      const options = getOptionsForMode(q, state.mode);
      const progress = ((state.currentIndex) / state.questions.length) * 100;
      const categoryLabel = CATEGORY_LABELS[q.category] || q.category;

      // Shuffle option order but track correct index
      const indices = options.map((_, i) => i);
      const shuffledIndices = shuffleArray(indices);

      const playerLabel = state.mode === 'eric' ? 'Eric' : 'Ruth';

      app.innerHTML = `
        <div class="fade-in">
          <div class="top-bar">
            <span>Playing as: <strong>${playerLabel}</strong></span>
            <a onclick="window.playAgain()">Start over</a>
          </div>
          <div class="progress-text">
            Question ${state.currentIndex + 1} of ${state.questions.length}
          </div>
          <div class="progress-bar">
            <div class="progress-bar-fill" style="width: ${progress}%"></div>
          </div>
          <div class="quiz-card">
            <span class="category-badge">${categoryLabel}</span>
            ${q.year ? `<span class="category-badge" style="margin-left:0.3rem; background: var(--text-secondary); color: var(--bg-primary);">${q.year}</span>` : ''}
            <p class="question-text">${q.question}</p>
            <div id="options">
              ${shuffledIndices.map(origIdx => `
                <button
                  class="option-btn"
                  data-index="${origIdx}"
                  onclick="window.answerQuestion(${origIdx})"
                >${options[origIdx]}</button>
              `).join('')}
            </div>
            <div id="feedback"></div>
          </div>
        </div>
      `;
    }

    // ─── Answer question ────────────────────────────────────────
    window.answerQuestion = function(selectedIndex) {
      const q = state.questions[state.currentIndex];
      const result = checkAnswer(q, state.mode, selectedIndex);
      state.answers.push({ correct: result.correct });

      // Disable all buttons and highlight correct/incorrect
      const modeData = q[state.mode];
      const correctText = modeData.options[modeData.correct];
      const buttons = document.querySelectorAll('.option-btn');
      buttons.forEach(btn => {
        btn.disabled = true;
        const idx = parseInt(btn.dataset.index);
        const isSelected = idx === selectedIndex;
        const textMatchesCorrect = modeData.options[idx] === correctText;

        if (isSelected && result.correct) {
          btn.classList.add('correct');
        } else if (isSelected && !result.correct) {
          btn.classList.add('incorrect');
        }
        if (!result.correct && idx === result.correctIndex) {
          btn.classList.add('was-correct');
        }
        // For all-same answers: highlight all matching options as correct
        if (result.correct && textMatchesCorrect && !isSelected) {
          btn.classList.add('correct');
          btn.style.opacity = '0.6';
        }
      });

      // Show explanation
      const feedback = document.getElementById('feedback');
      const isLast = state.currentIndex >= state.questions.length - 1;
      feedback.innerHTML = `
        <div class="explanation fade-in">
          <div class="verdict ${result.correct ? 'correct' : 'incorrect'}">
            ${result.correct ? 'Correct!' : 'Not quite!'}
          </div>
          <p>${result.explanation}</p>
        </div>
        <button class="next-btn" onclick="window.nextQuestion()">
          ${isLast ? 'See Results' : 'Next Question →'}
        </button>
      `;
    };

    // ─── Next question ──────────────────────────────────────────
    window.nextQuestion = function() {
      state.currentIndex++;
      if (state.currentIndex >= state.questions.length) {
        showResults();
      } else {
        showQuestion();
      }
    };

    // ─── Results screen ─────────────────────────────────────────
    function showResults() {
      const scoreObj = calculateScore(state.answers);
      const bonus = state.bonusFound ? 1 : 0;
      const totalWithBonus = scoreObj.score + bonus;

      // Ruth always gets 12/12 and a glowing review
      const isRuth = state.mode === 'ruth';
      const displayScore = isRuth ? scoreObj.total : totalWithBonus;
      const displayTotal = scoreObj.total;
      const displayPercent = isRuth ? 100 : scoreObj.percentage;
      const message = isRuth
        ? "A perfect score! You absolute superstar! Eric could never."
        : getResultMessage(scoreObj, state.mode);

      app.innerHTML = `
        <div class="fade-in">
          <h1>Quiz Complete!</h1>
          <div class="quiz-card">
            <div class="score-display">
              <div class="score-number">${displayScore}/${displayTotal}${!isRuth && bonus ? '*' : ''}</div>
              <div class="score-label">${displayPercent}%${!isRuth && bonus ? ' (+1 bonus for finding the hidden card!)' : ''}${isRuth ? ' — flawless!' : ''}</div>
            </div>
            <div class="result-message">"${message}"</div>
            ${state.mode === 'eric' ? `
              <p style="text-align:center; font-size:0.85rem; color: var(--text-secondary); margin-top:1rem;">
                Perhaps you should have picked Ruth...
              </p>
            ` : ''}
            <button class="share-btn" onclick="window.shareResult(${displayScore}, ${displayTotal})">
              Copy Result to Clipboard
            </button>
            <button class="play-again-btn" onclick="window.playAgain()">
              Play Again (New Questions, New Style!)
            </button>
          </div>
          <p style="text-align:center; margin-top:1rem; font-size:0.8rem; color: var(--text-secondary);">
            Happy Birthday, Eric! With love from Arthur 🎂
          </p>
        </div>
      `;
    }

    // ─── Share result ─────────────────────────────────────────────
    window.shareResult = function(score, total) {
      const modeLabel = state.mode === 'eric' ? 'Eric mode (hard!)' : 'Ruth mode';
      const text = `I scored ${score}/${total} on Eric's March 21st Birthday Quiz (${modeLabel})! 🎂 Try it: ${window.location.href}`;
      navigator.clipboard.writeText(text).then(() => {
        const btn = document.querySelector('.share-btn');
        if (btn) {
          btn.textContent = 'Copied!';
          btn.classList.add('copied');
        }
      }).catch(() => {
        // Fallback: select text for manual copy
        prompt('Copy this:', text);
      });
    };

    // ─── Play again ─────────────────────────────────────────────
    window.playAgain = function() {
      init();
    };

    // ─── Boot ───────────────────────────────────────────────────
    init();
  </script>
</body>
</html>
